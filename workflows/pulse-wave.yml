name: Generate Pulse Wave

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate SVG
        uses: Platane/snk@v3
        with:
          github_user_name: Vishvam2006
          outputs: |
            dist/pulse.svg?palette=github-dark&color_snake=00ff88

      - name: Push to branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
